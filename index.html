<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- Básico -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#51EB51" />

    <!-- Título (até ~60 caracteres) -->
    <title>Linka | Assessoria para Provedores de Internet (ISP)</title>

    <!-- Descrição (até ~155 caracteres) -->
    <meta
      name="description"
      content="Acelere o crescimento do seu provedor de internet. A Linka ajuda ISPs a conquistar novos assinantes com previsibilidade e estratégia."
    />

    <!-- Palavras-chave (não é tão relevante hoje, mas ajuda) -->
    <meta
      name="keywords"
      content="ISP, provedor de internet, marketing para ISP, crescimento de provedores, novos assinantes, assessoria ISP"
    />

    <!-- Autor -->
    <meta name="author" content="Linka Assessoria" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.linka.com.br" />

    <!-- Favicon -->
    <link rel="icon" href="/public/favicon.svg" sizes="any" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Linka | Acelere o crescimento do seu ISP" />
    <meta
      property="og:description"
      content="De dono de provedor para dono de negócio. Gere novos assinantes todos os dias com a assessoria certa."
    />
    <meta property="og:url" content="https://www.linka.com.br" />
    <!-- <meta property="og:image" content="https://www.linka.com.br/og-image.jpg" /> -->
    <meta property="og:site_name" content="Linka" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Linka | Crescimento para Provedores de Internet" />
    <meta
      name="twitter:description"
      content="Facilidade e previsibilidade para conquistar novos assinantes no seu ISP."
    />
    <!-- <meta name="twitter:image" content="https://www.linka.com.br/og-image.jpg" /> -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
